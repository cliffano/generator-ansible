---
name: CI
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 1
      matrix:
        node: [ '22', '24', '26' ]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v7
        with:
          set-safe-directory: ${{ github.workspace }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: make ci
